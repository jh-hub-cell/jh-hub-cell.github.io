<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>끝말잇기</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    color: #111827;
}

header {
    background: #111827;
    color: white;
    text-align: center;
    padding: 28px 20px;
}

header h1 {
    margin: 0 0 8px;
}

.container {
    max-width: 700px;
    margin: 25px auto;
    padding: 15px;
}

.status {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    margin-bottom: 15px;
}

#turn {
    font-size: 20px;
    font-weight: bold;
}

#lastWord {
    font-size: 30px;
    color: #2563eb;
    margin-top: 10px;
}

.input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 15px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 18px;
}

button {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

#submitBtn {
    padding: 0 25px;
    background: #2563eb;
    color: white;
}

#restartBtn {
    padding: 14px 20px;
    background: #64748b;
    color: white;
}

.message {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    min-height: 50px;
}

.words {
    background: white;
    padding: 20px;
    border-radius: 15px;
}

.word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.word {
    background: #dbeafe;
    padding: 8px 12px;
    border-radius: 20px;
}

#loading {
    color: #2563eb;
    font-weight: bold;
}

.rules {
    margin-top: 20px;
    color: #6b7280;
    line-height: 1.8;
    font-size: 14px;
}

@media (max-width: 600px) {
    .input-area {
        flex-direction: column;
    }

    #submitBtn {
        padding: 14px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🔤 끝말잇기</h1>
    <p>나 vs 컴퓨터</p>
</header>

<div class="container">

    <div id="loading" class="status">
        📚 단어 사전 불러오는 중...
    </div>

    <div class="status">

        <div id="turn">
            단어를 입력하세요
        </div>

        <div id="lastWord">
            -
        </div>

    </div>

    <div class="input-area">

        <input
            id="wordInput"
            placeholder="단어 입력"
            autocomplete="off"
            disabled
        >

        <button
            id="submitBtn"
            disabled
        >
            입력
        </button>

    </div>

    <div
        id="message"
        class="message"
    >
        단어를 불러오는 중입니다.
    </div>

    <div class="words">

        <h3>📚 사용한 단어</h3>

        <div
            id="wordList"
            class="word-list"
        ></div>

    </div>

    <br>

    <button
        id="restartBtn"
    >
        🔄 다시 시작
    </button>

    <div class="rules">

        <b>게임 규칙</b><br>
        • 국어 단어 목록에 있는 단어만 사용합니다.<br>
        • 이미 사용한 단어는 사용할 수 없습니다.<br>
        • 두음법칙을 적용합니다.<br>
        • 한방 단어도 허용합니다.<br>

    </div>

</div>

<script>

/* =========================
   설정
========================= */

const WORD_FILE = "wordslist.txt";


/* =========================
   게임 변수
========================= */

let words = [];

let wordSet = new Set();

let usedWords = new Set();

let lastWord = "";

let gameOver = false;


/* =========================
   HTML
========================= */

const input =
document.getElementById("wordInput");

const submitBtn =
document.getElementById("submitBtn");

const restartBtn =
document.getElementById("restartBtn");

const message =
document.getElementById("message");

const turn =
document.getElementById("turn");

const lastWordText =
document.getElementById("lastWord");

const wordList =
document.getElementById("wordList");

const loading =
document.getElementById("loading");


/* =========================
   단어 목록 불러오기
========================= */

async function loadWords() {

    try {

        const response =
        await fetch(WORD_FILE);

        if (!response.ok) {

            throw new Error(
                "단어 파일을 불러올 수 없습니다."
            );

        }

        const text =
        await response.text();


        words = text

            .split(/\r?\n/)

            .map(word => word.trim())

            .filter(word => {

                return /^[가-힣]+$/.test(word)
                && word.length >= 2;

            });


        wordSet =
        new Set(words);


        loading.textContent =
        `📚 ${words.length.toLocaleString()}개의 단어를 불러왔습니다.`;

        input.disabled = false;

        submitBtn.disabled = false;

        turn.textContent =
        "👤 당신의 차례입니다.";

        message.textContent =
        "첫 단어를 입력하세요.";

        input.focus();


    } catch (error) {

        loading.textContent =
        "❌ 단어 파일을 불러오지 못했습니다.";

        message.textContent =
        "wordslist.txt가 index.html과 같은 폴더에 있는지 확인하세요.";

        console.error(error);

    }

}


/* =========================
   두음법칙
========================= */

const initialSoundRules = {

    "녀": "여",
    "뇨": "요",
    "뉴": "유",
    "니": "이",

    "랴": "야",
    "려": "여",
    "례": "예",
    "료": "요",
    "류": "유",
    "리": "이",

    "라": "나",
    "래": "내",
    "로": "노",
    "뢰": "뇌",
    "루": "누",
    "르": "느"

};


/* =========================
   이어지는 글자 확인
========================= */

function getNextLetters(lastChar) {

    const result =
    new Set([lastChar]);


    if (initialSoundRules[lastChar]) {

        result.add(
            initialSoundRules[lastChar]
        );

    }


    return [...result];

}


/* =========================
   플레이어 차례
========================= */

function playerTurn() {

    if (gameOver) return;


    const word =
    input.value.trim();


    if (!word) {

        showMessage(
            "단어를 입력하세요."
        );

        return;

    }


    if (!wordSet.has(word)) {

        showMessage(
            "❌ 사전에 없는 단어입니다."
        );

        return;

    }


    if (usedWords.has(word)) {

        showMessage(
            "❌ 이미 사용한 단어입니다."
        );

        return;

    }


    if (lastWord !== "") {

        const lastChar =
        lastWord[lastWord.length - 1];


        const possibleLetters =
        getNextLetters(lastChar);


        if (!possibleLetters.includes(word[0])) {

            showMessage(
                `❌ "${possibleLetters.join(" 또는 ")}"로 시작해야 합니다.`
            );

            return;

        }

    }


    addWord(word);

    input.value = "";

    message.textContent =
    `✅ ${word} 입력 성공!`;

    turn.textContent =
    "🤖 컴퓨터 생각 중...";


    input.disabled = true;

    submitBtn.disabled = true;


    setTimeout(

        computerTurn,

        700

    );

}


/* =========================
   컴퓨터 차례
========================= */

function computerTurn() {

    if (gameOver) return;


    let candidates;


    if (lastWord === "") {

        candidates =
        words.filter(word => {

            return !usedWords.has(word);

        });

    }

    else {

        const lastChar =
        lastWord[lastWord.length - 1];


        const possibleLetters =
        getNextLetters(lastChar);


        candidates =
        words.filter(word => {

            return (

                possibleLetters.includes(word[0])

                &&

                !usedWords.has(word)

            );

        });

    }


    if (candidates.length === 0) {

        endGame(
            "🎉 컴퓨터가 이어갈 단어를 찾지 못했습니다! 당신의 승리!"
        );

        return;

    }


    const randomIndex =
    Math.floor(
        Math.random() * candidates.length
    );


    const computerWord =
    candidates[randomIndex];


    addWord(computerWord);


    message.textContent =
    `🤖 컴퓨터: ${computerWord}`;


    turn.textContent =
    "👤 당신의 차례입니다.";


    input.disabled = false;

    submitBtn.disabled = false;

    input.focus();

}


/* =========================
   단어 추가
========================= */

function addWord(word) {

    usedWords.add(word);

    lastWord =
    word;


    lastWordText.textContent =
    word;


    const element =
    document.createElement("span");


    element.className =
    "word";


    element.textContent =
    word;


    wordList.appendChild(element);

}


/* =========================
   메시지
========================= */

function showMessage(text) {

    message.textContent =
    text;

}


/* =========================
   게임 종료
========================= */

function endGame(text) {

    gameOver = true;


    turn.textContent =
    "🏁 게임 종료";


    message.textContent =
    text;


    input.disabled = true;

    submitBtn.disabled = true;

}


/* =========================
   다시 시작
========================= */

function restartGame() {

    if (words.length === 0) return;


    usedWords.clear();

    lastWord = "";

    gameOver = false;


    wordList.innerHTML =
    "";


    lastWordText.textContent =
    "-";


    turn.textContent =
    "👤 당신의 차례입니다.";


    message.textContent =
    "첫 단어를 입력하세요.";


    input.value = "";

    input.disabled = false;

    submitBtn.disabled = false;

    input.focus();

}


/* =========================
   버튼 이벤트
========================= */

submitBtn.addEventListener(
    "click",
    playerTurn
);


input.addEventListener(
    "keydown",
    event => {

        if (event.key === "Enter") {

            playerTurn();

        }

    }
);


restartBtn.addEventListener(
    "click",
    restartGame
);


/* =========================
   시작
========================= */

loadWords();

</script>

</body>
</html>
